<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Legal · ExigeTuSeguro.cl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --navy:  #0A3D62;
  --sky:   #3695BF;
  --green: #34A853;
  --g2:    #2d9147;
  --bg:    #eef2f7;
  --white: #ffffff;
  --gray:  #64748b;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
}

/* ── animated icon ── */
.i-rot  { transform-origin:22px 22px; animation: iRot 8s linear infinite; }
.i-puls { transform-origin:22px 22px; animation: iPuls 3s ease-in-out infinite; }
.i-orb  { animation: iOrb 2s ease-in-out infinite; }

@keyframes iRot  { to { transform:rotate(360deg); } }
@keyframes iPuls { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.08);opacity:.8;} }
@keyframes iOrb  { 0%,100%{opacity:1;} 50%{opacity:.25;} }

/* ── card ── */
.chat-card {
  width: 100%;
  max-width: 700px;
  height: min(800px, calc(100vh - 48px));
  background: var(--white);
  border-radius: 24px;
  box-shadow: 0 20px 64px rgba(10,61,98,.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── topbar ── */
.topbar {
  padding: 18px 24px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--sky) 100%);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

/* animated SVG icon replacing the avatar */
.topbar-icon { flex-shrink: 0; }

.topbar-info { flex: 1; }
.topbar-info h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem; font-weight: 600;
  color: white; margin-bottom: 2px;
}
.topbar-info p { font-size: .75rem; color: rgba(255,255,255,.6); }

.topbar-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(52,168,83,.2);
  border: 1px solid rgba(52,168,83,.35);
  color: #a8ffca;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .67rem; font-weight: 700;
  padding: 5px 11px; border-radius: 50px;
  letter-spacing: .5px; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0;
}
.topbar-badge .dot {
  width: 6px; height: 6px; background: var(--green);
  border-radius: 50%;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.15;} }

/* ── messages ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 26px 20px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scroll-behavior: smooth;
  background: #f7f9fc;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(10,61,98,.12); border-radius: 4px; }

/* ── bubbles ── */
.bwrap { display:flex; align-items:flex-end; gap:10px; }
.bwrap.user { flex-direction:row-reverse; }

.bav {
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; flex-shrink:0; margin-bottom:2px;
}
.bav.bot  { background:linear-gradient(135deg,var(--navy),var(--sky)); color:white; }
.bav.user { background:var(--green); color:white; }

.bubble {
  max-width: 73%;
  padding: 13px 17px;
  border-radius: 20px;
  font-size: .93rem;
  line-height: 1.65;
  animation: pop .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop {
  from { opacity:0; transform:scale(.88) translateY(10px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.bubble.bot {
  background: var(--white);
  color: #1e293b;
  border-bottom-left-radius: 5px;
  box-shadow: 0 2px 10px rgba(10,61,98,.08);
}
.bubble.user {
  background: linear-gradient(135deg,var(--navy),var(--sky));
  color: white;
  border-bottom-right-radius: 5px;
}
.bubble a { color:var(--green); text-decoration:underline; font-weight:600; }
.bubble.user a { color:#a8ffca; }
.bubble strong { font-weight:700; }
.bubble .tag {
  display:inline-block;
  background:rgba(52,168,83,.12); color:var(--g2);
  font-size:.73rem; font-weight:700;
  padding:2px 9px; border-radius:8px; margin:3px 3px 0 0;
}

/* typing */
.typing { display:flex; align-items:center; gap:5px; padding:12px 16px; }
.typing span {
  width:7px; height:7px; background:#cbd5e1;
  border-radius:50%; animation:bounce .9s infinite;
}
.typing span:nth-child(2) { animation-delay:.18s; }
.typing span:nth-child(3) { animation-delay:.36s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-7px);} }

/* ── quick replies ── */
.quickreplies {
  display:flex; flex-wrap:wrap; gap:8px;
  padding:14px 26px 16px;
  flex-shrink:0;
  background:#f7f9fc;
  border-top:1px solid rgba(10,61,98,.05);
}
.quickreplies:empty { padding:0; border-top:none; }

.qr-btn {
  padding:8px 16px;
  background:var(--white);
  border:1.5px solid rgba(10,61,98,.13);
  border-radius:50px;
  font-family:'DM Sans',sans-serif;
  font-size:.83rem; font-weight:500; color:var(--navy);
  cursor:pointer; transition:all .18s; white-space:nowrap;
  box-shadow:0 1px 4px rgba(10,61,98,.06);
}
.qr-btn:hover {
  background:var(--navy); color:white;
  border-color:var(--navy); transform:translateY(-2px);
  box-shadow:0 5px 14px rgba(10,61,98,.18);
}
.qr-btn:active { transform:translateY(0); }

/* ── input bar ── */
.inputbar {
  padding:14px 20px;
  border-top:1px solid rgba(10,61,98,.07);
  display:flex; gap:10px; align-items:center;
  flex-shrink:0; background:white;
}
.chat-input {
  flex:1; padding:12px 20px;
  border:1.5px solid rgba(10,61,98,.12);
  border-radius:50px;
  font-family:'DM Sans',sans-serif;
  font-size:.93rem; color:#1e293b;
  outline:none; transition:all .2s; background:#f7f9fc;
}
.chat-input:focus {
  border-color:var(--sky); background:white;
  box-shadow:0 0 0 3px rgba(54,149,191,.1);
}
.chat-input::placeholder { color:#b0bec5; }

.send-btn {
  width:46px; height:46px;
  background:linear-gradient(135deg,var(--green),var(--g2));
  border:none; border-radius:50%; color:white; font-size:1rem;
  cursor:pointer; transition:all .2s; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(52,168,83,.35);
}
.send-btn:hover { transform:scale(1.08); box-shadow:0 7px 22px rgba(52,168,83,.45); }
.send-btn:active { transform:scale(.97); }

/* ══════════════════
   MOBILE ≤ 600px
   ══════════════════ */
@media (max-width:600px) {
  body { padding:0; background:white; align-items:stretch; justify-content:flex-start; }

  .chat-card {
    max-width:100%; border-radius:0; box-shadow:none;
    height:100svh;
  }

  .topbar { padding:13px 16px; gap:10px; }
  .topbar-info h3 { font-size:.9rem; }
  .topbar-info p  { font-size:.71rem; }
  .topbar-badge span:not(.dot) { display:none; }
  .topbar-badge { padding:5px 9px; }

  .chat-messages { padding:18px 14px 12px; gap:14px; }

  .bubble { max-width:84%; font-size:.89rem; padding:11px 14px; }
  .bav    { width:27px; height:27px; font-size:.67rem; }

  .quickreplies {
    flex-wrap:nowrap; overflow-x:auto;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
    padding:10px 14px 12px; gap:7px;
  }
  .quickreplies::-webkit-scrollbar { display:none; }
  .qr-btn { flex-shrink:0; font-size:.79rem; padding:7px 13px; }

  .inputbar { padding:10px 12px; gap:8px; }
  .chat-input { font-size:.88rem; padding:10px 16px; }
  .send-btn   { width:42px; height:42px; }
}
</style>
</head>
<body>

<div class="chat-card">

  <!-- TOPBAR: animated icon + title + badge -->
  <div class="topbar">

    <!-- Animated logo icon (replaces balance scale) -->

    <div class="topbar-info">

    <div class="topbar-badge">

  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- QUICK REPLIES -->
  <div class="quickreplies" id="quickReplies">

    <button class="qr-btn" onclick="sendQR(this)">Subir mis documentos</button>
    <button class="qr-btn" onclick="sendQR(this)">Plazos para reclamar</button>
    <button class="qr-btn" onclick="sendQR(this)">SOAP 2026</button>
    <button class="qr-btn" onclick="sendQR(this)">Hablar con un abogado</button>

  <div class="inputbar">

</div>

<script>
const KB = [
  /* ── SALUDO ── */
  {
    keys: ['hola','buenas','buenos días','buenas tardes','buenas noches','hey','saludos'],
    answer: `¡Hola! 👋 Soy el asistente virtual de <strong>ExigeTuSeguro.cl</strong>.\n\nEstoy aquí para orientarte sobre tus derechos como asegurado en Chile: rechazos, impugnaciones, plazos legales, SOAP y mucho más.\n\n¿En qué te puedo ayudar hoy?`,
    qr: ['Rechazaron mi seguro','Subir mis documentos','Hablar con un abogado']
  },

  /* ── RECHAZO / NEGATIVA ── */
  {
    keys: ['rechaz','negaron','denegaron','no pagaron','no me pagan','siniestro rechaz','niegan','negativa'],
    answer: `Si tu aseguradora rechazó tu siniestro, tienes opciones legales concretas:\n\n<strong>Vía 1 · Reclamo ante la aseguradora</strong>\nEscrito formal citando el Código de Comercio. La aseguradora debe responder en los plazos establecidos.\n\n<strong>Vía 2 · CMF</strong>\nPuedes reclamar ante la Comisión para el Mercado Financiero (Ley N° 21.000) en <a href="https://www.cmfchile.cl" target="_blank">cmfchile.cl</a>.\n\n<strong>Vía 3 · Arbitraje o demanda judicial</strong>\nSegún el Art. 543 del Código de Comercio, las controversias de seguros se resuelven ante árbitro. Para montos menores a 10.000 UF puedes optar por tribunal ordinario.\n\nRecuerda: la ley presume que el siniestro está cubierto — <strong>es la aseguradora quien debe probar lo contrario</strong>.\n\n📋 Sube tu póliza o carta de rechazo para que nuestro equipo evalúe tu caso:\n👉 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Impugnar liquidación','Subir mis documentos','¿Qué es la CMF?','Hablar con un abogado']
  },

  /* ── IMPUGNAR / LIQUIDACIÓN ── */
  {
    keys: ['impugnar','impugnación','liquidación','liquidacion','liquidador','informe liquidac','DS 1055','ds1055'],
    answer: `El proceso de impugnación de un informe de liquidación está regulado por el <strong>DS 1.055</strong>:\n\n<strong>Plazos para impugnar (desde que recibes el informe):</strong>\n• Pólizas normales → <strong>10 días hábiles</strong>\n• Pólizas con prima superior a 200 UF → <strong>20 días hábiles</strong>\n\n<strong>Respuesta del liquidador:</strong>\n• Pólizas normales → 6 días hábiles\n• Pólizas &gt;200 UF → 12 días hábiles\n\n<strong>Pago de la indemnización:</strong>\nUna vez resuelta la impugnación, la aseguradora tiene <strong>6 días hábiles</strong> para pagarte.\n\nEl informe debe contener opinión técnica fundada sobre cada cobertura rechazada. Si no es así, es impugnable.\n\n📋 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Subir mis documentos','Rechazaron mi seguro','Hablar con un abogado']
  },

  /* ── PLAZOS ── */
  {
    keys: ['plazo','prescripci','cuánto tiempo','cuanto tiempo','fecha límite','vence','vencer','tiempo para reclamar'],
    answer: `Los plazos legales clave en seguros en Chile son:\n\n<strong>Prescripción general</strong> → <strong>4 años</strong> desde que la obligación se hizo exigible (Art. 541 Código de Comercio).\n\n<strong>Notificar el siniestro</strong> → Lo antes posible. Cada póliza puede fijar plazos internos breves (algunos de 3–5 días).\n\n<strong>Impugnar informe de liquidación</strong> → 10 días hábiles (o 20 si prima &gt;200 UF).\n\n<strong>Pago de indemnización</strong> → 6 días hábiles desde aprobada la liquidación.\n\n<strong>SOAP (fallecimiento)</strong> → 7 días hábiles para seguros desde el 9/02/2026; 10 días hábiles para pólizas anteriores.\n\n⏰ Mientras más rápido actúes, más fácil es reunir pruebas.\n\n📋 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Impugnar liquidación','Rechazaron mi seguro','Hablar con un abogado']
  },

  /* ── CMF ── */
  {
    keys: ['cmf','comisión para el mercado','comision mercado financiero','regulador','supervisor seguros'],
    answer: `La <strong>Comisión para el Mercado Financiero (CMF)</strong>, creada por la Ley N° 21.000, es el organismo que regula y supervisa a todas las compañías de seguros en Chile. Reemplazó a la antigua SVS.\n\nPuedes presentar un reclamo ante la CMF si:\n• Tu aseguradora rechaza tu siniestro injustamente.\n• No responde en los plazos legales.\n• Detectas prácticas abusivas.\n\n⚠️ <strong>Importante:</strong> La CMF fiscaliza y puede sancionar a las aseguradoras, pero no ordena pagos directamente. Para exigir el pago necesitas además la vía judicial o arbitral (Art. 543 Código de Comercio).\n\nAun así, un pronunciamiento favorable de la CMF es evidencia valiosa en cualquier litigio posterior.\n\nWeb oficial: <a href="https://www.cmfchile.cl" target="_blank">cmfchile.cl</a>`,
    qr: ['Subir mis documentos','Rechazaron mi seguro','Hablar con un abogado']
  },

  /* ── INDISPUTABILIDAD ── */
  {
    keys: ['indisputabilidad','indisputable','dos años','2 años vigencia','art 592','artículo 592'],
    answer: `La <strong>indisputabilidad</strong> es una protección clave en los seguros de vida, regulada por el <strong>Art. 592 del Código de Comercio</strong>.\n\n¿Qué significa? Una vez transcurridos <strong>2 años</strong> desde la contratación, la aseguradora <strong>no puede anular la póliza</strong> ni negarse a pagar alegando que omitiste información al contratar — ni siquiera si esa omisión fue involuntaria.\n\n<strong>Excepciones:</strong> Solo aplica si existe <strong>dolo comprobado</strong> (intención de engañar) o fraude.\n\nEjemplo práctico: si olvidaste declarar una condición médica y tu póliza tiene más de 2 años, la aseguradora no puede usar eso para rechazarte.\n\n📋 ¿Te rechazaron un seguro de vida? Cuéntanos:\n👉 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Seguro de vida','Subir mis documentos','Hablar con un abogado']
  },

  /* ── SEGURO DE VIDA ── */
  {
    keys: ['vida','seguro de vida','fallecimiento','muerte','beneficiario','desgravamen','invalidez'],
    answer: `Los seguros de vida tienen protecciones especiales en Chile:\n\n<span class="tag">Indisputabilidad</span> Después de 2 años, la aseguradora no puede anular la póliza por omisiones (salvo dolo). Art. 592 Código de Comercio.\n\n<span class="tag">Preexistencias</span> Solo se pueden rechazar si la condición fue <strong>diagnosticada Y conocida</strong> por el asegurado al contratar.\n\n<span class="tag">Carga de la prueba</span> Es la aseguradora quien debe demostrar que existe causa para denegar — no tú.\n\n<span class="tag">Beneficiarios</span> El orden legal de cobro es: cónyuge, hijos menores, hijos mayores, padres — y el conviviente civil solo si no existe ninguno de los anteriores.\n\n📋 Sube tu póliza o carta de rechazo:\n👉 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Indisputabilidad','Subir mis documentos','Hablar con un abogado']
  },

  /* ── SALUD / ISAPRE ── */
  {
    keys: ['salud','isapre','médic','hospital','clínica','enfermedad','preexistencia'],
    answer: `En seguros de salud, el motivo más frecuente de rechazo son las <strong>preexistencias</strong>.\n\nLo que dice la ley (Art. 590-592 Código de Comercio): una preexistencia solo es válida como causal de rechazo si la condición fue <strong>diagnosticada Y conocida por el asegurado</strong> al momento de contratar.\n\nSi te rechazan por una enfermedad que desconocías, es muy probable que sea impugnable.\n\nTambién aplica a coberturas complementarias de Isapres y seguros privados de salud.\n\n📋 Cuéntanos tu caso:\n👉 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Subir mis documentos','Rechazaron mi seguro','Hablar con un abogado']
  },

  /* ── VEHICULAR ── */
  {
    keys: ['vehiculo','vehicular','auto','accidente','choque','robo auto','seguro auto','todo riesgo','terceros'],
    answer: `Los seguros vehiculares tienen motivos de rechazo frecuentes — y muchos son impugnables:\n\n• <strong>Exclusión por "culpa grave"</strong> mal fundamentada.\n• Tasación del vehículo muy por debajo de su valor real.\n• Incumplimiento de plazos de notificación por causas ajenas al asegurado.\n• Cláusulas ambiguas (que la ley obliga a interpretar a tu favor).\n\nTipos de seguros en Chile:\n<span class="tag">SOAP</span> Obligatorio. Cubre lesiones a personas en accidentes.\n<span class="tag">Terceros</span> Cubre daños que causes a otros vehículos o personas.\n<span class="tag">Todo Riesgo</span> Cobertura amplia: daños propios, robos, terceros.\n\n📋 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,

function findAnswer(text) {
  const q = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let best = null, top = 0;
  for (const item of KB) {
    let s = 0;
    for (const k of item.keys)
      if (q.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,''))) s++;
    if (s > top) { top = s; best = item; }
  }
  return top > 0 ? best : null;
}

const msgs  = document.getElementById('chatMessages');
const qrEl  = document.getElementById('quickReplies');
const input = document.getElementById('chatInput');

function addBubble(html, type) {
  const wrap = document.createElement('div'); wrap.className = `bwrap ${type}`;
  const av   = document.createElement('div'); av.className   = `bav ${type}`;
  av.innerHTML = type === 'bot' ? '<i class="fas fa-balance-scale"></i>' : '<i class="fas fa-user"></i>';
  const bub  = document.createElement('div'); bub.className  = `bubble ${type}`;
  bub.innerHTML = html;
  wrap.appendChild(av); wrap.appendChild(bub);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div'); wrap.className = 'bwrap bot'; wrap.id = 'tw';
  const av   = document.createElement('div'); av.className   = 'bav bot';
  av.innerHTML = '<i class="fas fa-balance-scale"></i>';
  const bub  = document.createElement('div'); bub.className  = 'bubble bot typing';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av); wrap.appendChild(bub);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('tw'); if(t) t.remove(); }

function setQR(list) {
  qrEl.innerHTML = '';
  (list||[]).forEach(l => {
    const b = document.createElement('button');
    b.className = 'qr-btn'; b.textContent = l;
    b.onclick = () => respond(l);
    qrEl.appendChild(b);
  });
}

function respond(text) {
  addBubble(text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'), 'user');
  setQR([]);
  showTyping();
  setTimeout(() => {
    removeTyping();
    const f = findAnswer(text);
    if (f) { addBubble(f.answer,'bot'); setQR(f.qr); }
    else   { addBubble(FALLBACK,'bot'); setQR(['Subir mis documentos','Hablar con un abogado']); }
  }, 900 + Math.random()*400);
}

function sendMessage() {
  const t = input.value.trim(); if(!t) return;
  input.value = ''; respond(t);
}

function sendQR(btn) { respond(btn.textContent); }

input.addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
