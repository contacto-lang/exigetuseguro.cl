<style>
:root {
  --navy:   #0A3D62;
  --sky:    #3695BF;
  --green:  #34A853;
  --green2: #2d9147;
  --bg:     #f0f4f8;
  --white:  #ffffff;
  --gray:   #64748b;
  --light:  #e8f0fe;
  --radius: 18px;
  --shadow: 0 8px 32px rgba(10,61,98,0.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px;
}

/* ── LOGO animations ── */
.f-rot  { transform-origin: 35px 35px; animation: fRot 8s linear infinite; }
.f-puls { transform-origin: 35px 35px; animation: fPuls 3s ease-in-out infinite; }
.f-orb  { animation: fOrb 2s ease-in-out infinite; }

@keyframes fRot   { to { transform: rotate(360deg); } }
@keyframes fPuls  { 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.07); opacity:.8; } }
@keyframes fOrb   { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }

/* ── HEADER ── */
.header {
  width: 100%;
  max-width: 680px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 0 4px;
}

.header-logo svg { display: block; }

.header-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(52,168,83,.12);
  border: 1px solid rgba(52,168,83,.25);
  color: var(--green2);
  font-family: 'Space Grotesk', sans-serif;
  font-size: .72rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 50px;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.header-badge .dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

/* ── CHAT CARD ── */
.chat-card {
  width: 100%;
  max-width: 680px;
  background: var(--white);
  border-radius: 24px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(10,61,98,.07);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: min(680px, calc(100vh - 180px));
}

/* top bar */
.chat-topbar {
  padding: 16px 20px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--sky) 100%);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.chat-topbar-avatar {
  width: 38px; height: 38px;
  background: rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 1rem;
  flex-shrink: 0;
}
.chat-topbar-info h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: .95rem; font-weight: 600; color: white; margin-bottom: 1px;
}
.chat-topbar-info p { font-size: .74rem; color: rgba(255,255,255,.65); }

/* messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(10,61,98,.15); border-radius: 4px; }

/* bubble */
.bubble-wrap { display: flex; align-items: flex-end; gap: 8px; }
.bubble-wrap.user { flex-direction: row-reverse; }

.bubble-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; flex-shrink: 0; margin-bottom: 2px;
}
.bubble-avatar.bot { background: linear-gradient(135deg,var(--navy),var(--sky)); color: white; }
.bubble-avatar.user { background: var(--green); color: white; }

.bubble {
  max-width: 75%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: .9rem;
  line-height: 1.55;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { opacity:0; transform:scale(.85) translateY(8px); }
  to   { opacity:1; transform:scale(1)   translateY(0); }
}

.bubble.bot {
  background: #f0f4f8;
  color: #1e293b;
  border-bottom-left-radius: 4px;
}
.bubble.user {
  background: linear-gradient(135deg, var(--navy), var(--sky));
  color: white;
  border-bottom-right-radius: 4px;
}
.bubble a { color: var(--green); text-decoration: underline; font-weight: 600; }
.bubble.user a { color: #9effc0; }
.bubble strong { font-weight: 700; }
.bubble .tag {
  display: inline-block; background: rgba(52,168,83,.15);
  color: var(--green2); font-size:.75rem; font-weight:700;
  padding: 2px 8px; border-radius: 8px; margin: 2px 2px 0 0;
}

/* typing indicator */
.typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
.typing span {
  width: 7px; height: 7px; background: var(--gray);
  border-radius: 50%; animation: bounce .9s infinite;
}
.typing span:nth-child(2) { animation-delay: .18s; }
.typing span:nth-child(3) { animation-delay: .36s; }
@keyframes bounce {
  0%,80%,100%{ transform:translateY(0); }
  40%{ transform:translateY(-6px); }
}

/* quick replies */
.quickreplies {
  display: flex; flex-wrap: wrap; gap: 7px;
  padding: 0 20px 12px;
  flex-shrink: 0;
}
.qr-btn {
  padding: 7px 13px;
  background: var(--white);
  border: 1.5px solid rgba(10,61,98,.15);
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: .8rem; font-weight: 500;
  color: var(--navy);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.qr-btn:hover {
  background: var(--navy); color: white;
  border-color: var(--navy); transform: translateY(-1px);
}

/* input bar */
.chat-inputbar {
  padding: 12px 16px;
  border-top: 1px solid rgba(10,61,98,.07);
  display: flex; gap: 10px; align-items: center;
  flex-shrink: 0;
  background: white;
}
.chat-input {
  flex: 1; padding: 10px 14px;
  border: 1.5px solid rgba(10,61,98,.13);
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem; color: #1e293b;
  outline: none; transition: border-color .2s;
  background: #f8fafc;
}
.chat-input:focus { border-color: var(--sky); background: white; }
.chat-input::placeholder { color: #a0aec0; }

.send-btn {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--green), var(--green2));
  border: none; border-radius: 50%;
  color: white; font-size: .95rem;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 4px 12px rgba(52,168,83,.3);
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(52,168,83,.4); }

/* ── FOOTER ── */
.page-footer {
  margin-top: 16px;
  text-align: center;
  font-size: .75rem;
  color: var(--gray);
}
.page-footer a { color: var(--sky); text-decoration: none; font-weight: 600; }

@media (max-width: 480px) {
  body { padding: 12px 10px; }
  .bubble { max-width: 85%; font-size: .87rem; }
  .header-badge span { display: none; }
  .chat-card { border-radius: 18px; height: calc(100vh - 140px); }
}
</style>

  {

    answer: `Impugnar un rechazo es tu derecho. El proceso típico tiene 3 vías:\n\n<strong>Vía 1 · Aseguradora directa</strong>\nEnviar un escrito formal citando los artículos del Código de Comercio. Tienen 30 días para responder.\n\n<strong>Vía 2 · CMF</strong>\nSi la aseguradora no responde o la respuesta es negativa, presenta un reclamo ante la Comisión para el Mercado Financiero.\n\n<strong>Vía 3 · Judicial</strong>\nDemanda civil. Para montos menores a 10.000 UF puede ser en Juzgado de Policía Local.\n\n📋 Para que evaluemos cuál es la mejor estrategia para tu caso, <strong>sube tu póliza o carta de rechazo</strong>:\n👉 <a href="https://exigetuseguro.cl/contacto" target="_blank">exigetuseguro.cl/contacto</a>`,
    qr: ['Subir mis documentos','Hablar con un abogado','¿Qué es la CMF?']
  }
];

const FALLBACK = `Entiendo tu consulta. Para darte una orientación más precisa, te recomiendo hablar directamente con nuestro equipo.\n\n📱 <a href="https://wa.me/56979939868" target="_blank">WhatsApp · +56 9 7993 9868</a>\n📧 <a href="mailto:contacto@exigetuseguro.cl">contacto@exigetuseguro.cl</a>\n\nLa <strong>primera consulta es gratuita</strong> y sin compromiso.`;

// ── Engine ──────────────────────────────────────────────────
function findAnswer(text) {
  const q = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  let best = null, bestScore = 0;
  for (const item of KB) {
    let score = 0;
    for (const k of item.keys) {
      if (q.includes(k.normalize('NFD').replace(/[\u0300-\u036f]/g,''))) score++;
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }
  return bestScore > 0 ? best : null;
}

// ── DOM helpers ─────────────────────────────────────────────
const msgs   = document.getElementById('chatMessages');
const qrArea = document.getElementById('quickReplies');
const input  = document.getElementById('chatInput');

function addBubble(html, type) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${type}`;

  const av = document.createElement('div');
  av.className = `bubble-avatar ${type}`;
  av.innerHTML = type === 'bot' ? '<i class="fas fa-balance-scale"></i>' : '<i class="fas fa-user"></i>';

  const bub = document.createElement('div');
  bub.className = `bubble ${type}`;
  bub.innerHTML = html;

  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap bot';
  wrap.id = 'typingWrap';

  const av = document.createElement('div');
  av.className = 'bubble-avatar bot';
  av.innerHTML = '<i class="fas fa-balance-scale"></i>';

  const bub = document.createElement('div');
  bub.className = 'bubble bot typing';
  bub.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingWrap');
  if (t) t.remove();
}

function setQR(list) {
  qrArea.innerHTML = '';
  (list || []).forEach(label => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = label;
    b.onclick = () => sendQR(b);
    qrArea.appendChild(b);
  });
}

// ── Send flow ───────────────────────────────────────────────
function respond(text) {
  addBubble(escapeHtml(text), 'user');
  setQR([]);

  showTyping();
  setTimeout(() => {
    removeTyping();
    const found = findAnswer(text);
    if (found) {
      addBubble(found.answer, 'bot');
      setQR(found.qr);
    } else {
      addBubble(FALLBACK, 'bot');
      setQR(['Hablar con un abogado','¿Rechazaron mi seguro?']);
    }
  }, 900 + Math.random() * 400);
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  respond(text);
}

function sendQR(btn) {
  respond(btn.textContent);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Welcome message ─────────────────────────────────────────
setTimeout(() => {
  addBubble(`¡Hola! 👋 Soy el asistente virtual de <strong>ExigeTuSeguro.cl</strong>.<br><br>Puedo orientarte sobre tus derechos como asegurado en Chile: rechazos, plazos, coberturas, impugnaciones y más.<br><br>¿En qué te puedo ayudar?`, 'bot');
}, 400);
</script>
